<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Para ti, papá</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Caveat:wght@500;600;700&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-night-1:#080b22;
    --bg-night-2:#161b44;
    --bg-dawn-1:#2b1f4a;
    --bg-dawn-2:#c97b4a;
    --bg-dawn-3:#f2b66d;
    --paper:#f7efdf;
    --ink:#2c2113;
    --ink-soft:#5a4c38;
    --gold:#e3a857;
    --gold-bright:#f4c878;
    --coral:#e2725b;
    --cream:#f5efe6;
    --road-line:#f4c878;
    --stripe-red:#b0402c;
    --stripe-blue:#2c4f8a;
    --safe-t:env(safe-area-inset-top,0px);
    --safe-b:env(safe-area-inset-bottom,0px);
    --safe-l:env(safe-area-inset-left,0px);
    --safe-r:env(safe-area-inset-right,0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; width:100%;
    height:100vh; height:100dvh;
    overflow:hidden; overscroll-behavior:none;
    font-family:'Work Sans', sans-serif;
    background:var(--bg-night-1);
    color:var(--ink);
  }
  button{font-family:inherit;}

  /* ---------- BACKGROUND ---------- */
  .sky{ position:fixed; inset:0; z-index:0; }
  .sky-night, .sky-dawn{ position:absolute; inset:0; transition:opacity 1.4s ease; }
  .sky-night{
    background:
      radial-gradient(ellipse at 25% 8%, rgba(255,255,255,0.06), transparent 40%),
      linear-gradient(180deg, var(--bg-night-1) 0%, var(--bg-night-2) 55%, #1c2150 100%);
    opacity:1;
  }
  .sky-dawn{
    background:
      radial-gradient(ellipse at 75% 10%, rgba(255,225,170,0.55), transparent 55%),
      linear-gradient(180deg, var(--bg-dawn-1) 0%, var(--bg-dawn-2) 55%, var(--bg-dawn-3) 100%);
    opacity:0;
  }
  .stars{position:absolute; inset:0; overflow:hidden;}
  .star{ position:absolute; background:#fff; border-radius:50%; animation:twinkle 3.5s ease-in-out infinite; }
  @keyframes twinkle{ 0%,100%{opacity:.25; transform:scale(1);} 50%{opacity:1; transform:scale(1.3);} }
  .firefly{
    position:absolute; bottom:0; width:2.5px; height:2.5px; border-radius:50%;
    background:var(--gold-bright); box-shadow:0 0 6px 2px rgba(244,200,120,.6);
    opacity:0; animation:driftUp linear infinite;
  }
  @keyframes driftUp{
    0%{ opacity:0; transform:translate(0,0); }
    12%{ opacity:.8; }
    88%{ opacity:.5; }
    100%{ opacity:0; transform:translate(var(--sway,16px), -42vh); }
  }
  .shooting-star{ position:absolute; width:2px; height:2px; background:#fff; border-radius:50%; box-shadow:0 0 0 1px rgba(255,255,255,.6); opacity:0; }
  .shooting-star.fire{ animation:shoot 1.5s ease-out forwards; }
  @keyframes shoot{
    0%{opacity:1; transform:translate(0,0);}
    8%{opacity:1;}
    100%{opacity:0; transform:translate(-220px,150px);}
  }

  .hills{ position:absolute; bottom:0; left:0; width:100%; height:16vh; z-index:1; transition:transform .7s ease; }
  .hills svg{display:block; width:100%; height:100%;}

  /* ---------- FLYING CHARACTERS ---------- */
  .flyer{ position:fixed; left:0; z-index:2; pointer-events:none; will-change:transform; }
  .flyer img{ display:block; width:100%; height:100%; object-fit:contain; filter:drop-shadow(0 5px 10px rgba(0,0,0,.4)); }

  /* ---------- APP SHELL (flex column, nothing overlaps) ---------- */
  .app{
    position:fixed; inset:0; z-index:4; display:flex; flex-direction:column;
    padding-top:var(--safe-t); padding-bottom:var(--safe-b);
    padding-left:var(--safe-l); padding-right:var(--safe-r);
  }

  /* ---------- TOP BAR ---------- */
  .topbar{ flex:0 0 auto; padding:10px 14px 8px; display:flex; align-items:center; gap:8px; }
  .road-mini{ flex:1; position:relative; height:34px; }
  .road-svg{width:100%; height:100%; display:block;}
  .road-path-base{ fill:none; stroke:rgba(255,255,255,0.16); stroke-width:10; stroke-linecap:round; }
  .road-path-line{
    fill:none; stroke:var(--road-line); stroke-width:2; stroke-dasharray:8 11;
    stroke-linecap:round; opacity:.65; animation:dashmove 6s linear infinite;
  }
  @keyframes dashmove{ to{ stroke-dashoffset:-200; } }
  .car-marker{
    position:absolute; transform:translate(-50%,-50%); font-size:15px; z-index:3;
    filter:drop-shadow(0 0 5px rgba(244,200,120,.85));
    transition:left .6s cubic-bezier(.65,0,.35,1), top .6s cubic-bezier(.65,0,.35,1);
  }
  .stop-counter{ flex:0 0 auto; font-size:10.5px; color:var(--cream); opacity:.75; letter-spacing:.03em; white-space:nowrap; min-width:50px; text-align:right; }
  .icon-btn{
    flex:0 0 auto; width:34px; height:34px; border-radius:50%; border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:15px;
    transition:transform .2s cubic-bezier(.5,-0.3,.4,1.5);
  }
  .icon-btn:active{ transform:scale(.9); }
  .hug-btn{ background:linear-gradient(135deg, var(--coral), #c14e36); box-shadow:0 6px 14px rgba(226,114,91,.45); font-size:17px; }
  .mute-btn{ background:rgba(255,255,255,0.08); border:1px solid rgba(244,200,120,.3); color:var(--cream); font-size:14px; }

  /* ---------- MAIN / STAGE ---------- */
  .stage{ flex:1 1 auto; min-height:0; display:flex; align-items:center; justify-content:center; padding:6px 16px; position:relative; }
  .section{
    position:absolute; inset:6px 16px; display:flex; align-items:center; justify-content:center;
    opacity:0; visibility:hidden; pointer-events:none; transition:opacity .45s ease;
  }
  .section.active{ opacity:1; visibility:visible; pointer-events:auto; }

  /* ---------- HERO ---------- */
  #hero{ flex-direction:column; text-align:center; }
  .hero-eyebrow{ font-family:'Caveat', cursive; font-size:22px; color:var(--gold-bright); margin-bottom:2px; opacity:.9; }
  .hero-title{ font-family:'Fraunces', serif; font-weight:500; font-size:clamp(28px,9vw,38px); color:var(--cream); margin:0 0 8px 0; line-height:1.08; }
  .hero-sub{ font-family:'Work Sans'; font-weight:300; font-size:13.5px; color:var(--cream); opacity:.65; max-width:280px; margin:0 auto 28px; letter-spacing:.01em; line-height:1.5; }
  .envelope{ position:relative; width:160px; height:108px; margin:0 auto 46px; cursor:pointer; }
  .envelope-body{ position:absolute; inset:0; background:linear-gradient(165deg,#f7efdf,#e9d9b6); border-radius:5px; box-shadow:0 14px 30px rgba(0,0,0,.45); }
  .envelope-flap{
    position:absolute; top:0; left:0; width:100%; height:100%;
    clip-path:polygon(0 0, 100% 0, 50% 58%);
    background:linear-gradient(165deg,#efe1c2,#dcc89a);
    transform-origin:top center; transition:transform .7s cubic-bezier(.7,0,.3,1);
    border-radius:5px 5px 0 0;
  }
  .envelope.open .envelope-flap{ transform:rotateX(180deg); }
  .envelope-seal{
    position:absolute; top:46%; left:50%; transform:translate(-50%,-50%); width:28px; height:28px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--coral), #a8402b);
    display:flex; align-items:center; justify-content:center; color:#f7e8d6; font-size:12px;
    box-shadow:0 3px 8px rgba(0,0,0,.35); z-index:2; transition:opacity .3s ease;
  }
  .envelope.open .envelope-seal{ opacity:0; }
  .envelope-hint{ position:absolute; bottom:-38px; left:0; width:100%; text-align:center; font-size:11.5px; color:var(--cream); opacity:.55; letter-spacing:.02em; }

  /* ---------- JOURNEY ---------- */
  #journey{ flex-direction:column; }
  .card{
    position:relative; width:100%; max-width:420px; max-height:100%; height:auto;
    display:flex; flex-direction:column; justify-content:center;
    background-color:var(--paper);
    background-image:repeating-linear-gradient(0deg, transparent 0 22px, rgba(44,33,19,0.035) 22px 23px);
    color:var(--ink); border-radius:14px;
    box-shadow:0 18px 40px rgba(0,0,0,.5);
    overflow:hidden;
    transition:transform .4s cubic-bezier(.65,0,.35,1), opacity .4s ease;
  }
  .card::before, .card::after{
    content:''; position:absolute; top:0; bottom:0; width:8px;
    background-image:repeating-linear-gradient(135deg, var(--stripe-red) 0 7px, var(--paper) 7px 10px, var(--stripe-blue) 10px 17px, var(--paper) 17px 20px);
    opacity:.85; z-index:2;
  }
  .card::before{ left:0; }
  .card::after{ right:0; }
  .card.anim-out-next{ transform:translateX(-60px) rotate(-2deg); opacity:0; }
  .card.anim-out-prev{ transform:translateX(60px) rotate(2deg); opacity:0; }
  .card.anim-in-next{ transform:translateX(60px) rotate(1.5deg); opacity:0; }
  .card.anim-in-prev{ transform:translateX(-60px) rotate(-1.5deg); opacity:0; }

  .card-watermark{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:120px; opacity:.07; color:var(--ink); pointer-events:none; z-index:0;
    animation:breathe 6s ease-in-out infinite;
  }
  @keyframes breathe{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.045); } }

  .card-seal{
    position:absolute; top:10px; right:18px; width:28px; height:28px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--gold-bright), var(--gold));
    display:flex; align-items:center; justify-content:center; color:#241a08; font-size:12px;
    box-shadow:0 6px 12px rgba(0,0,0,.35); z-index:2;
    animation:sealDrop .5s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes sealDrop{
    0%{ opacity:0; transform:translateY(-14px) rotate(-25deg) scale(.4); }
    100%{ opacity:1; transform:translateY(0) rotate(-8deg) scale(1); }
  }

  .card-eyebrow{
    position:relative; z-index:1; flex:0 0 auto;
    font-family:'Work Sans'; font-size:9.5px; letter-spacing:.13em; text-transform:uppercase;
    color:var(--coral); font-weight:600; padding:20px 24px 0;
    display:flex; align-items:center; gap:7px;
  }
  .card-eyebrow .line{ height:1px; flex:1; background:linear-gradient(90deg, var(--coral), transparent); transform-origin:left center; animation:drawLine .7s ease both; }
  @keyframes drawLine{ 0%{ transform:scaleX(0); opacity:0; } 100%{ transform:scaleX(1); opacity:1; } }

  .card-body{ position:relative; z-index:1; flex:1 1 auto; min-height:0; overflow-y:auto; padding:12px 24px 20px; -webkit-overflow-scrolling:touch; }
  .card-text{ font-family:'Fraunces', serif; font-weight:400; font-style:italic; font-size:16px; line-height:1.6; color:var(--ink); margin:0; }
  .card-text .drop{ float:left; font-size:42px; line-height:34px; padding:4px 6px 0 0; font-weight:500; color:var(--coral); font-style:normal; }
  .card-ornament{ text-align:center; color:var(--gold); opacity:.55; font-size:15px; margin-top:14px; }

  .nav-row{ flex:0 0 auto; display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 4px 4px; }
  .nav-btn{
    border:none; cursor:pointer; border-radius:999px; font-size:13.5px; font-weight:500;
    padding:12px 18px; display:flex; align-items:center; gap:6px; min-height:44px;
    transition:transform .15s ease, opacity .15s ease;
  }
  .nav-btn:active{ transform:scale(.96); }
  .nav-btn.ghost{ background:rgba(255,255,255,0.07); color:var(--cream); border:1px solid rgba(244,200,120,.35); }
  .nav-btn.ghost:disabled{ opacity:.25; }
  .nav-btn.solid{ background:linear-gradient(135deg, var(--gold-bright), var(--gold)); color:#241a08; box-shadow:0 6px 16px rgba(227,168,87,.35); flex:1; justify-content:center; }

  /* ---------- FINAL ---------- */
  #final{ flex-direction:column; overflow-y:auto; padding-top:8px; -webkit-overflow-scrolling:touch; }
  .final-title{ font-family:'Fraunces', serif; font-weight:500; font-size:clamp(24px,7vw,32px); color:var(--cream); margin:6px 0 16px; text-align:center; }
  .photo-frame{
    width:118px; height:142px; margin:0 auto 18px; padding:8px 8px 24px;
    background:#fdfaf3; box-shadow:0 12px 26px rgba(0,0,0,.4); transform:rotate(2deg);
    position:relative; flex:0 0 auto;
  }
  .final-photo{ width:100%; height:100%; object-fit:cover; display:block; }
  .photo-frame .caption{
    position:absolute; bottom:2px; left:0; width:100%; text-align:center;
    font-family:'Caveat', cursive; font-size:13px; color:var(--ink-soft);
  }
  .signature-block{
    position:relative;
    background-color:var(--paper);
    background-image:repeating-linear-gradient(0deg, transparent 0 20px, rgba(44,33,19,0.03) 20px 21px);
    color:var(--ink); padding:22px 24px; border-radius:10px; box-shadow:0 16px 36px rgba(0,0,0,.5);
    max-width:340px; margin:0 auto 18px; transform:rotate(-0.6deg); flex:0 0 auto; overflow:hidden;
  }
  .signature-block::before, .signature-block::after{
    content:''; position:absolute; top:0; bottom:0; width:7px;
    background-image:repeating-linear-gradient(135deg, var(--stripe-red) 0 6px, var(--paper) 6px 9px, var(--stripe-blue) 9px 15px, var(--paper) 15px 18px);
    opacity:.85;
  }
  .signature-block::before{ left:0; }
  .signature-block::after{ right:0; }
  .signature-line{ font-family:'Fraunces', serif; font-style:italic; font-size:14.5px; margin:0 0 9px; line-height:1.45; }
  .signature-name{ font-family:'Caveat', cursive; font-size:30px; color:var(--coral); margin-top:2px; }
  .final-buttons{ display:flex; flex-direction:column; gap:10px; align-items:center; padding-bottom:14px; }
  .final-buttons .nav-btn{ width:100%; max-width:280px; justify-content:center; }

  /* ---------- HUG TOAST + PARTICLES ---------- */
  .hug-toast{
    position:fixed; z-index:21; top:calc(var(--safe-t) + 50px); left:50%; transform:translate(-50%,-8px);
    background:var(--paper); color:var(--ink); padding:10px 16px; border-radius:10px;
    font-family:'Fraunces', serif; font-style:italic; font-size:12.5px; box-shadow:0 12px 26px rgba(0,0,0,.4);
    opacity:0; transition:opacity .3s ease, transform .3s ease; pointer-events:none; max-width:78vw; text-align:center;
  }
  .hug-toast.show{ opacity:1; transform:translate(-50%,0); }

  .particle{ position:fixed; z-index:19; pointer-events:none; font-size:15px; animation:floatUp 1.6s ease-out forwards; }
  @keyframes floatUp{
    0%{ opacity:1; transform:translate(0,0) scale(.8) rotate(0deg); }
    100%{ opacity:0; transform:translate(var(--dx),-130px) scale(1.15) rotate(var(--rot)); }
  }
  .particle.plane{ font-size:18px; animation:flyAway 1.9s ease-in forwards; }
  @keyframes flyAway{
    0%{ opacity:1; transform:translate(0,0) rotate(35deg) scale(.8); }
    55%{ opacity:1; }
    100%{ opacity:0; transform:translate(160px,-180px) rotate(35deg) scale(1.1); }
  }
  .confetti{ position:fixed; top:-16px; z-index:19; pointer-events:none; width:6px; height:11px; opacity:.95; animation:confettiFall linear forwards; }
  @keyframes confettiFall{ 0%{ transform:translateY(0) rotate(0deg); opacity:1; } 100%{ transform:translateY(110vh) rotate(540deg); opacity:0; } }

  @media (prefers-reduced-motion: reduce){
    .road-path-line, .card-watermark, .firefly{ animation:none; }
    .star{ animation:none; opacity:.6;}
    .shooting-star.fire{ animation:none; opacity:0; }
    .card, .nav-btn, .icon-btn{ transition-duration:.1s; }
  }

  @media (max-height:700px){
    .hero-title{ font-size:clamp(24px,8vw,30px); }
    .hero-sub{ margin-bottom:18px; font-size:12.5px; }
    .envelope{ width:128px; height:88px; margin-bottom:36px; }
    .card-text{ font-size:14.5px; }
  }
</style>
</head>
<body>

<div class="sky">
  <div class="sky-night"></div>
  <div class="sky-dawn" id="skyDawn"></div>
  <div class="stars" id="stars"></div>
</div>
<div class="hills" id="hills">
  <svg viewBox="0 0 800 150" preserveAspectRatio="none">
    <path d="M0,150 L0,90 C100,60 190,105 280,80 C380,50 450,100 540,75 C630,50 710,90 800,70 L800,150 Z" fill="#0c1230"></path>
    <path d="M0,150 L0,115 C110,90 210,125 300,105 C400,82 490,118 590,100 C680,85 740,110 800,100 L800,150 Z" fill="#141a3e"></path>
  </svg>
</div>

<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="road-mini">
      <svg class="road-svg" viewBox="0 0 800 60" preserveAspectRatio="none">
        <path id="roadPath" class="road-path-base" d="M -10 30 C 130 6, 230 54, 370 30 S 630 6 770 30 S 850 50 870 30"></path>
        <path class="road-path-line" d="M -10 30 C 130 6, 230 54, 370 30 S 630 6 770 30 S 850 50 870 30"></path>
      </svg>
      <div class="car-marker" id="carMarker">🚐</div>
    </div>
    <div class="stop-counter" id="progressLabel">1 de 18</div>
    <button class="icon-btn mute-btn" id="muteBtn" aria-label="Silenciar música">🔊</button>
    <button class="icon-btn hug-btn" id="hugBtn" aria-label="Mandar un abrazo hasta Alemania">🤗</button>
  </div>

  <!-- STAGE -->
  <div class="stage">

    <!-- HERO -->
    <section class="section active" id="hero">
      <div class="hero-eyebrow">Querido papá,</div>
      <h1 class="hero-title">Una carta para ti</h1>
      <p class="hero-sub">Antes de irme a Alemania, quiero que sepas todo esto. Ábrela cuando estés listo.</p>
      <div class="envelope" id="envelope" role="button" aria-label="Abrir la carta">
        <div class="envelope-body"></div>
        <div class="envelope-seal">♥</div>
        <div class="envelope-flap"></div>
        <div class="envelope-hint">Toca el sobre para abrir el camino</div>
      </div>
    </section>

    <!-- JOURNEY -->
    <section class="section" id="journey">
      <div class="card" id="card"><!-- filled by JS --></div>
    </section>

    <!-- FINAL -->
    <section class="section" id="final">
      <div style="width:100%;">
        <h2 class="final-title">Feliz Día del Padre</h2>
        <div class="photo-frame">
          <img class="final-photo" src="foto-final.jpg" alt="Papá y Uriel">
          <div class="caption">Tú y yo ❤</div>
        </div>
        <div class="signature-block">
          <p class="signature-line">Feliz Día del Padre, Ichipu.</p>
          <p class="signature-line">Te quiero mucho.</p>
          <p class="signature-name">Uriel</p>
        </div>
        <div class="final-buttons">
          <button class="nav-btn ghost" id="restartBtn">↺ Volver a vivir el camino</button>
        </div>
      </div>
    </section>

  </div>

  <!-- NAV -->
  <div class="nav-row" id="navRow">
    <button class="nav-btn ghost" id="prevBtn" aria-label="Párrafo anterior">← Atrás</button>
    <button class="nav-btn solid" id="nextBtn" aria-label="Siguiente párrafo">Seguir el camino →</button>
  </div>

</div>

<div class="hug-toast" id="hugToast"></div>

<audio id="bgMusic" src="cancion.mp3" loop preload="auto"></audio>
<audio id="hugSound" src="abrazo.mp3" preload="auto"></audio>

<script>
(function(){
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* ---------- LETTER DATA (mismos 18 párrafos que la versión de escritorio) ---------- */
  const paragraphs = [
    { text:"Quiero aprovechar este Día del Padre para decirte cosas que muchas veces pienso, pero que casi nunca sé expresar de la mejor manera." },
    { text:"Primero que nada, quiero darte las gracias. Gracias por todo lo que has hecho por mí y por nuestra familia. De verdad estoy muy agradecido contigo." },
    { text:"Con el tiempo me he dado cuenta de que, además de ser un gran padre, eres un gran hombre. Pienso que eres una persona con principios morales muy marcados y con un enorme sentido de responsabilidad. Admiro mucho cómo no permites que pequeñas distracciones o cosas pasajeras te desvíen de tus objetivos y cómo siempre te mantienes enfocado en lo que consideras importante." },
    { text:"También admiro y respeto muchísimo la manera en que nunca dudas ni un solo momento en poner a tu familia por encima de ti mismo. Siempre buscas lo mejor para nosotros, aun cuando eso implique hacer sacrificios personales. Es algo que admiro profundamente y que espero algún día poder hacer también por mi propia familia." },
    { text:"Para mí eres un hombre ejemplar. Y no solo lo pienso yo. Puedo ver cómo mis primos y muchas otras personas te tienen admiración y respeto por la persona que eres, por tu carácter, por tu forma de pensar, por tu cabeza y por tus acciones. Ver eso me hace sentir muy orgulloso de ser tu hijo." },
    { text:"Quiero que sepas que valoro enormemente todo lo que haces por mí. Has apostado mucho por mi educación y por mi futuro. Confías plenamente en mí y has invertido tiempo, esfuerzo, dinero y muchas otras cosas para darme oportunidades que sé que no son fáciles de conseguir. Espero algún día poder estar a la altura de toda esa confianza que has depositado en mí." },
    { text:"También quiero agradecerte el enorme sacrificio que estás haciendo para que yo pueda irme a Alemania. Sé que no es algo sencillo y que detrás de esa oportunidad hay años de trabajo, preocupaciones y decisiones en las que muchas veces te pusiste a ti mismo en segundo plano para darme la posibilidad de cumplir este sueño.", special:true, tag:"Rumbo a Alemania" },
    { text:"Quiero que tengas por seguro que todas las enseñanzas que me has dado las llevo conmigo. Me has enseñado con palabras, pero sobre todo con tu ejemplo. Estando allá intentaré actuar con responsabilidad, mantener mis principios firmes, tomar buenas decisiones y recordar siempre de dónde vengo y quién me enseñó a ser la persona que soy hoy." },
    { text:"Conforme he ido creciendo, he empezado a notar esas pequeñas cosas que antes pasaban desapercibidas. Como cuando prefieres manejar cientos de kilómetros para llevar a tu familia de una ciudad a otra simplemente porque quieres asegurarte de que lleguemos seguros. O cuando decides no comprarte los mejores tenis, la mejor ropa o el mejor celular para poder dármelo a mí. A veces es difícil comprender cómo un padre puede preferir sacrificar su propia comodidad, o incluso quitarse el pan de la boca, con tal de dárselo a sus hijos. Y sinceramente es algo que admiro muchísimo." },
    { text:"También pienso que eres una persona muy fuerte. Siempre te he visto enfrentar los problemas y las dificultades con cabeza fría, sin dejarte llevar por las emociones y tratando de tomar las mejores decisiones posibles. Esa fortaleza es algo que respeto mucho y que intento aprender de ti." },
    { text:"Creo que una de las mayores seguridades que he tenido en mi vida ha sido saber que siempre has estado detrás de mí. Nunca he tenido que preguntarme qué pasaría si algo sale mal, porque siempre he sentido que cuento contigo. Y sinceramente nunca he dudado que, pase lo que pase, tú estarías ahí para ayudarme. Saber eso me ha dado mucha tranquilidad y mucha confianza para atreverme a perseguir mis metas." },
    { text:"También quiero agradecerte la confianza que siempre me has dado y la confianza tan grande que yo siento contigo. Sé que muchas veces no te platico tanto sobre algunas cosas de mi vida, pero quiero que sepas que no es porque no me sienta en confianza contigo; al contrario. Hay veces en las que simplemente no sé qué decir o no encuentro la manera de expresar lo que pienso o siento. Pero créeme cuando te digo que tengo una confianza enorme contigo. Incluso algunos de mis amigos se han sorprendido al saber las cosas que te he platicado, o que sabes de mí y la naturalidad con  la que te las puedo  decir, ya que muchos hijos como ellos nunca le confiarían estos temas a sus papá. Y es algo que valoro muchísimo, como aquella vez que me llevaste al doctor para ya sabes qué. Son detalles como ese los que me hacen darme cuenta de que, además de ser mi papá, también has sabido ser alguien en quien puedo confiar plenamente, aún que tu puedas llegar a sentir que no." },
    { text:"Quiero que sepas que aspiro a que algún día, además de ser un gran padre como tú, pueda llegar a ser aunque sea la mitad del hombre que eres. Quiero ser una persona fuerte, inteligente, íntegra, responsable, disciplinada, trabajadora, prudente, generosa, confiable, resiliente y capaz de mantenerse firme en sus principios. Quiero ser un líder que predique con el ejemplo, un proveedor que cuide de su familia sin esperar nada a cambio y una persona a la que otros puedan acudir cuando tengan problemas porque saben que encontrarán apoyo, consejo y una respuesta sensata. No sé si algún día logre convertirme en alguien así, pero sí sé que he tenido el mejor ejemplo posible frente a mí durante toda mi vida." },
    { text:"A veces no sé cómo expresar todos estos sentimientos y probablemente no me desenvuelvo de la mejor manera para demostrarlos. Pero quiero que sepas que te tengo un amor inmenso. Y además de ese amor, siento por ti un respeto y una admiración enormes." },
    { text:"También deseo que llegue un momento en tu vida en el que puedas descansar un poco más y dedicarte tiempo a ti mismo. Siento que has pasado gran parte de tu vida preocupándote por nosotros, trabajando, haciendo sacrificios y procurando que nunca nos falte nada. Me gustaría que algún día puedas disfrutar más de las cosas que te gustan, con la tranquilidad de saber que tu esfuerzo valió la pena." },
    { text:"Y cuando esté en Alemania y me extrañes, quiero que leas esta carta. Quiero que recuerdes que, aunque esté a miles de kilómetros de distancia, una parte de mí siempre estará en casa contigo. Imagina que estas palabras son un abrazo mío para que puedas sentirme cerca. Quiero que sepas que pensaré mucho en ti y que agradeceré cada día todo lo que has hecho por mí.", special:true, tag:"A miles de km" },
    { text:"Espero que cuando regrese de Alemania puedas mirar atrás y sentir tranquilidad al ver que todos los sacrificios que hiciste, todas las preocupaciones que tuviste y todo el esfuerzo que pusiste en mí dieron frutos. Espero que puedas sentir que valió la pena apostar por mí." },
    { text:"Gracias por todo lo que has hecho, por todo lo que haces y por todo lo que sigues sacrificando por nosotros. Me siento muy orgulloso de ser tu hijo y espero que algún día puedas sentirte tan orgulloso de mí como yo me siento orgulloso de ti." }
  ];
  const total = paragraphs.length;
  const watermarkIcons = ['❤','✦','🌿','🧭','☀'];

  let view = 'hero';
  let index = 0;

  const heroSection = document.getElementById('hero');
  const journeySection = document.getElementById('journey');
  const finalSection = document.getElementById('final');
  const envelope = document.getElementById('envelope');
  const card = document.getElementById('card');
  const navRow = document.getElementById('navRow');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const progressLabel = document.getElementById('progressLabel');
  const skyDawn = document.getElementById('skyDawn');
  const carMarker = document.getElementById('carMarker');
  const restartBtn = document.getElementById('restartBtn');
  const hugBtn = document.getElementById('hugBtn');
  const hugToast = document.getElementById('hugToast');
  const hills = document.getElementById('hills');
  const muteBtn = document.getElementById('muteBtn');
  const bgMusic = document.getElementById('bgMusic');
  const topbar = document.querySelector('.topbar');

  /* ---------- AUDIO ---------- */
  const MUSIC_VOL = 0.45;
  const MUSIC_DUCK = 0.06;
  const HUG_GAIN = 1.9;
  bgMusic.volume = MUSIC_VOL;
  let musicStarted = false;
  let muted = false;
  let fadeTimer = null;
  let activeHugs = 0;
  let audioCtx = null;

  function ensureAudioCtx(){
    if(!audioCtx){
      const AC = window.AudioContext || window.webkitAudioContext;
      if(AC){ audioCtx = new AC(); }
    }
    if(audioCtx && audioCtx.state === 'suspended'){ audioCtx.resume(); }
    return audioCtx;
  }
  function fadeMusicTo(target, duration){
    clearInterval(fadeTimer);
    const start = bgMusic.volume;
    const t0 = performance.now();
    fadeTimer = setInterval(()=>{
      const t = Math.min(1, (performance.now()-t0)/duration);
      bgMusic.volume = start + (target-start)*t;
      if(t>=1) clearInterval(fadeTimer);
    }, 40);
  }
  function startMusic(){
    if(musicStarted) return;
    musicStarted = true;
    ensureAudioCtx();
    bgMusic.play().catch(()=>{});
  }
  muteBtn.addEventListener('click', ()=>{
    muted = !muted;
    bgMusic.muted = muted;
    muteBtn.textContent = muted ? '🔇' : '🔊';
  });

  function playHugSound(){
    activeHugs++;
    fadeMusicTo(MUSIC_DUCK, 120);
    const finishOnce = (()=>{
      let finished = false;
      return ()=>{
        if(finished) return; finished = true;
        activeHugs = Math.max(0, activeHugs-1);
        if(activeHugs===0) fadeMusicTo(MUSIC_VOL, 550);
      };
    })();
    try{
      const ctx = ensureAudioCtx();
      if(!ctx) throw new Error('no audio context');
      const snd = new Audio('abrazo.mp3');
      snd.muted = muted;
      const src = ctx.createMediaElementSource(snd);
      const gain = ctx.createGain();
      gain.gain.value = HUG_GAIN;
      src.connect(gain).connect(ctx.destination);
      snd.addEventListener('ended', finishOnce, {once:true});
      snd.play().catch(finishOnce);
      setTimeout(finishOnce, 4000);
    }catch(err){
      const snd = new Audio('abrazo.mp3');
      snd.volume = 1;
      snd.muted = muted;
      snd.addEventListener('ended', finishOnce, {once:true});
      snd.play().catch(finishOnce);
      setTimeout(finishOnce, 4000);
    }
  }

  /* ---------- STARS + FIREFLIES + SHOOTING STARS ---------- */
  const starsWrap = document.getElementById('stars');
  for(let i=0;i<40;i++){
    const s = document.createElement('div');
    s.className='star';
    const size = Math.random()*1.8+1;
    s.style.width = size+'px';
    s.style.height = size+'px';
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*55+'%';
    s.style.animationDelay = (Math.random()*3.5)+'s';
    starsWrap.appendChild(s);
  }
  if(!reduceMotion){
    for(let i=0;i<6;i++){
      const f = document.createElement('div');
      f.className='firefly';
      f.style.left = Math.random()*100+'%';
      f.style.animationDuration = (10+Math.random()*8)+'s';
      f.style.animationDelay = (Math.random()*10)+'s';
      f.style.setProperty('--sway', ((Math.random()-0.5)*50)+'px');
      starsWrap.appendChild(f);
    }
  }
  function shootStar(){
    if(reduceMotion) return;
    const s = document.createElement('div');
    s.className='shooting-star fire';
    s.style.left = (35+Math.random()*45)+'%';
    s.style.top = (Math.random()*16)+'%';
    starsWrap.appendChild(s);
    setTimeout(()=>s.remove(),1600);
  }
  function loopShoot(){ shootStar(); setTimeout(loopShoot, 7000+Math.random()*6000); }
  setTimeout(loopShoot, 3500);

  /* ---------- FLYING CHARACTERS (solo durante la carta, nunca sobre ella) ---------- */
  function topBoundaryBottom(){ return topbar.getBoundingClientRect().bottom; }
  function bottomBoundaryTop(){ return navRow.getBoundingClientRect().top; }

  function spawnFlyer(src, w, h, alt){
    if(view !== 'journey') return;
    const cardRect = card.getBoundingClientRect();
    const topMin = topBoundaryBottom() + 10;
    const topMax = cardRect.top - h - 8;
    const botMin = cardRect.bottom + 8;
    const botMax = bottomBoundaryTop() - h - 10;
    const bands = [];
    if(topMax - topMin > 14) bands.push([topMin, topMax]);
    if(botMax - botMin > 14) bands.push([botMin, botMax]);
    if(!bands.length) return;
    const band = bands[Math.floor(Math.random()*bands.length)];
    const y = band[0] + Math.random()*(band[1]-band[0]);
    const ltr = Math.random() < 0.5;
    const vw = window.innerWidth;
    const startX = ltr ? -w-24 : vw+24;
    const endX = ltr ? vw+24 : -w-24;
    const dur = 6000 + Math.random()*2200;

    const el = document.createElement('div');
    el.className = 'flyer';
    el.style.top = y+'px';
    el.style.width = w+'px';
    el.style.height = h+'px';
    el.style.transform = `translateX(${startX}px)`;
    const img = document.createElement('img');
    img.src = src;
    img.alt = alt;
    if(!ltr){ img.style.transform = 'scaleX(-1)'; }
    el.appendChild(img);
    document.body.appendChild(el);

    if(typeof el.animate === 'function'){
      const anim = el.animate(
        [{ transform:`translateX(${startX}px)` }, { transform:`translateX(${endX}px)` }],
        { duration: dur, easing:'linear' }
      );
      anim.onfinish = ()=> el.remove();
    } else {
      el.style.transition = `transform ${dur}ms linear`;
      requestAnimationFrame(()=>{ el.style.transform = `translateX(${endX}px)`; });
      setTimeout(()=> el.remove(), dur+100);
    }
  }

  function startFlyerLoop(spawnFn, firstMin, firstMax, repMin, repMax){
    function loop(isFirst){
      const delay = isFirst ? (firstMin+Math.random()*(firstMax-firstMin)) : (repMin+Math.random()*(repMax-repMin));
      setTimeout(()=>{
        spawnFn();
        loop(false);
      }, delay);
    }
    loop(true);
  }
  if(!reduceMotion){
    startFlyerLoop(()=>spawnFlyer('perrito.png', 96, 42, 'Perrito salchicha volando'), 8000, 13000, 17000, 28000);
    startFlyerLoop(()=>spawnFlyer('superman.png', 108, 69, 'Superman volando con su perrito'), 13000, 19000, 22000, 35000);
  }

  /* ---------- MINI ROAD PROGRESS ---------- */
  const roadPath = document.getElementById('roadPath');
  const VB_W = 800, VB_H = 60;
  let pathLen = 0;
  function measurePath(){ pathLen = roadPath.getTotalLength(); updateCarPosition(); }

  function updateCarPosition(){
    const frac = total===1 ? 0 : index/(total-1);
    const pt = roadPath.getPointAtLength(frac*pathLen);
    carMarker.style.left = (pt.x/VB_W*100)+'%';
    carMarker.style.top = (pt.y/VB_H*100)+'%';
    skyDawn.style.opacity = view==='final' ? 1 : Math.min(frac*0.95, 0.95);
    hills.style.transform = `translateX(${-(frac*12)}px)`;
  }
  window.addEventListener('resize', measurePath);

  /* ---------- RENDER CARD ---------- */
  function renderCard(){
    const p = paragraphs[index];
    const wm = p.special ? '✈' : watermarkIcons[index % watermarkIcons.length];
    let html = `<div class="card-watermark">${wm}</div><div class="card-seal">✦</div>`;
    html += `<div class="card-eyebrow">${p.tag ? p.tag : 'Parada '+(index+1)}<span class="line"></span></div>`;
    let text = p.text;
    if(index===0){
      const first = text.charAt(0);
      text = `<span class="drop">${first}</span>` + text.slice(1);
    }
    html += `<div class="card-body"><p class="card-text">${text}</p><div class="card-ornament">❧</div></div>`;
    card.innerHTML = html;
    progressLabel.textContent = (index+1)+' de '+total;
    prevBtn.disabled = index===0;
    nextBtn.textContent = index===total-1 ? 'Llegar a casa ❤️' : 'Seguir el camino →';
    updateCarPosition();
  }

  function animateSwap(direction){
    const outClass = direction==='next' ? 'anim-out-next' : 'anim-out-prev';
    const inClass = direction==='next' ? 'anim-in-next' : 'anim-in-prev';
    if(reduceMotion){ renderCard(); return; }
    card.classList.add(outClass);
    setTimeout(()=>{
      card.classList.remove(outClass);
      renderCard();
      card.classList.add(inClass);
      requestAnimationFrame(()=>{
        requestAnimationFrame(()=>{ card.classList.remove(inClass); });
      });
    }, 230);
  }

  function goTo(i){
    if(i===index) return;
    const dir = i>index ? 'next' : 'prev';
    index = Math.max(0, Math.min(total-1, i));
    animateSwap(dir);
  }

  function setView(next){
    view = next;
    heroSection.classList.toggle('active', view==='hero');
    journeySection.classList.toggle('active', view==='journey');
    finalSection.classList.toggle('active', view==='final');
    navRow.style.display = view==='journey' ? 'flex' : 'none';
    updateCarPosition();
    if(view==='final') burstConfetti();
  }
  navRow.style.display = 'none';

  envelope.addEventListener('click', openLetter);
  function openLetter(){
    if(envelope.classList.contains('open')) return;
    envelope.classList.add('open');
    startMusic();
    setTimeout(()=>{
      index = 0;
      setView('journey');
      renderCard();
    }, reduceMotion ? 80 : 600);
  }

  nextBtn.addEventListener('click', ()=>{
    if(index < total-1){ goTo(index+1); }
    else { setView('final'); }
  });
  prevBtn.addEventListener('click', ()=>{ if(index>0) goTo(index-1); });
  restartBtn.addEventListener('click', ()=>{ index = 0; setView('journey'); renderCard(); });

  /* ---------- HUG BUTTON: él le manda un abrazo a Uriel, hasta Alemania ---------- */
  const hugMessages = [
    'Tu abrazo ya va en camino a Alemania. ✈️',
    'Uriel sintió tu abrazo desde aquí. ❤️',
    'Un abrazo cruzando el Atlántico para Uriel.',
    'Acabas de mandarle un abrazo a Uriel. 🤍',
    'Ese abrazo ya casi llega a Alemania. 💛'
  ];
  const hearts = ['❤️','🤍','✨','💛'];
  hugBtn.addEventListener('click', ()=>{
    playHugSound();
    const msg = hugMessages[Math.floor(Math.random()*hugMessages.length)];
    hugToast.textContent = msg;
    hugToast.classList.add('show');
    clearTimeout(hugBtn._t);
    hugBtn._t = setTimeout(()=> hugToast.classList.remove('show'), 2200);

    const rect = hugBtn.getBoundingClientRect();
    const count = reduceMotion ? 3 : 10;
    for(let i=0;i<count;i++){
      const p = document.createElement('div');
      p.className='particle';
      p.textContent = hearts[Math.floor(Math.random()*hearts.length)];
      p.style.left = (rect.left+rect.width/2)+'px';
      p.style.top = (rect.top+rect.height/2)+'px';
      const dx = (Math.random()-0.5)*140;
      const rot = (Math.random()-0.5)*100;
      p.style.setProperty('--dx', dx+'px');
      p.style.setProperty('--rot', rot+'deg');
      p.style.animationDelay = (Math.random()*0.15)+'s';
      document.body.appendChild(p);
      setTimeout(()=>p.remove(), 2000);
    }
    if(!reduceMotion){
      const plane = document.createElement('div');
      plane.className='particle plane';
      plane.textContent='✈️';
      plane.style.left=(rect.left+rect.width/2)+'px';
      plane.style.top=(rect.top+rect.height/2)+'px';
      document.body.appendChild(plane);
      setTimeout(()=>plane.remove(), 2000);
    }
  });

  /* ---------- CONFETTI ---------- */
  function burstConfetti(){
    if(reduceMotion) return;
    const colors = ['#e3a857','#f4c878','#e2725b','#f5efe6'];
    const count = 30;
    for(let i=0;i<count;i++){
      const c = document.createElement('div');
      c.className='confetti';
      c.style.left = Math.random()*100+'vw';
      c.style.background = colors[Math.floor(Math.random()*colors.length)];
      c.style.animationDuration = (2.4+Math.random()*1.6)+'s';
      c.style.animationDelay = (Math.random()*0.5)+'s';
      c.style.borderRadius = Math.random()>0.5 ? '50%':'2px';
      document.body.appendChild(c);
      setTimeout(()=>c.remove(), 4600);
    }
  }

  /* ---------- INIT ---------- */
  measurePath();
  renderCard();
})();
</script>
</body>
</html>
